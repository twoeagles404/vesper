<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vesper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── TOKENS ── */
    :root {
      --bg:          #05070f;
      --glass:       rgba(255,255,255,0.04);
      --glass-hi:    rgba(255,255,255,0.07);
      --border:      rgba(255,255,255,0.08);
      --border-hi:   rgba(255,255,255,0.16);
      --divider:     rgba(255,255,255,0.07);
      /* Work side — cool blue tint */
      --work-accent: #60a5fa;
      --work-glow:   rgba(96,165,250,0.06);
      /* Homelab side — warm purple tint */
      --lab-accent:  #a78bfa;
      --lab-glow:    rgba(167,139,250,0.06);
      /* Shared */
      --amber:  #fbbf24;
      --green:  #34d399;
      --red:    #f87171;
      --t1:     #f1f5f9;
      --t2:     #94a3b8;
      --t3:     #475569;
      --mono:   'JetBrains Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--t1);
      display: flex;
      flex-direction: column;
    }

    ::-webkit-scrollbar            { width: 4px; }
    ::-webkit-scrollbar-track      { background: transparent; }
    ::-webkit-scrollbar-thumb      { background: rgba(255,255,255,.1); border-radius: 2px; }

    /* ══════════════════════════════════════
       HEADER
    ══════════════════════════════════════ */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(5,7,15,.9);
      backdrop-filter: blur(24px);
      flex-shrink: 0;
      z-index: 100;
    }

    .logo {
      display: flex; align-items: center; gap: 10px;
      font-size: .85rem; font-weight: 700;
      letter-spacing: .2em; text-transform: uppercase;
    }
    .logo-orb {
      width: 22px; height: 22px; border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, #fbbf24 0%, #a78bfa 55%, transparent 100%);
      box-shadow: 0 0 16px rgba(167,139,250,.7), 0 0 32px rgba(251,191,36,.3);
      animation: orb 4s ease-in-out infinite;
    }
    @keyframes orb {
      0%,100% { box-shadow: 0 0 16px rgba(167,139,250,.7), 0 0 32px rgba(251,191,36,.3); }
      50%      { box-shadow: 0 0 26px rgba(167,139,250,1),  0 0 52px rgba(251,191,36,.5); }
    }

    .header-center {
      display: flex; flex-direction: column; align-items: center;
    }
    #clock    { font-family: var(--mono); font-size: 1.6rem; font-weight: 500; letter-spacing: .05em; line-height: 1; }
    #dateline { font-size: .68rem; color: var(--t2); letter-spacing: .08em; margin-top: 2px; }

    /* partition labels in header */
    .partition-labels {
      display: flex; gap: 6px;
    }
    .pl {
      font-size: .65rem; font-weight: 600;
      letter-spacing: .14em; text-transform: uppercase;
      padding: 3px 10px; border-radius: 20px;
    }
    .pl.work { background: rgba(96,165,250,.12); color: var(--work-accent); border: 1px solid rgba(96,165,250,.2); }
    .pl.lab  { background: rgba(167,139,250,.12); color: var(--lab-accent);  border: 1px solid rgba(167,139,250,.2); }

    /* ══════════════════════════════════════
       TWO-PARTITION BODY
    ══════════════════════════════════════ */
    .body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── PANEL ── */
    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 20px 8px;
      border-bottom: 1px solid var(--divider);
      flex-shrink: 0;
    }
    .panel-header .ph-dot {
      width: 7px; height: 7px; border-radius: 50%;
    }
    .panel-header .ph-label {
      font-size: .65rem; font-weight: 700;
      letter-spacing: .18em; text-transform: uppercase;
    }

    .work-panel   { background: var(--work-glow); border-right: 1px solid var(--divider); }
    .work-panel   .ph-dot   { background: var(--work-accent); box-shadow: 0 0 8px rgba(96,165,250,.6); }
    .work-panel   .ph-label { color: var(--work-accent); }

    .homelab-panel { background: var(--lab-glow); }
    .homelab-panel .ph-dot   { background: var(--lab-accent); box-shadow: 0 0 8px rgba(167,139,250,.6); }
    .homelab-panel .ph-label { color: var(--lab-accent); }

    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ══════════════════════════════════════
       CARD
    ══════════════════════════════════════ */
    .card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      transition: border-color .2s;
    }
    .card:hover { border-color: var(--border-hi); }

    .card-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .card-label {
      font-size: .63rem; font-weight: 600;
      letter-spacing: .14em; text-transform: uppercase; color: var(--t3);
    }
    .cdot { width: 5px; height: 5px; border-radius: 50%; background: var(--t3); }

    /* ══════════════════════════════════════
       WEATHER STRIP  (work side top)
    ══════════════════════════════════════ */
    .weather-strip {
      display: flex; align-items: center; gap: 14px;
      padding: 10px 14px;
      background: rgba(96,165,250,.05);
      border: 1px solid rgba(96,165,250,.1);
      border-radius: 12px;
    }
    .ws-icon { width: 44px; height: 44px; }
    .ws-temp { font-size: 2rem; font-weight: 300; line-height: 1; }
    .ws-unit { font-size: .9rem; color: var(--t2); }
    .ws-right { display: flex; flex-direction: column; gap: 2px; }
    .ws-desc  { font-size: .8rem; color: var(--t2); }
    .ws-meta  { display: flex; gap: 10px; }
    .ws-mi    { font-size: .68rem; color: var(--t3); }
    .ws-mi span { color: var(--t2); }

    /* ══════════════════════════════════════
       CALENDAR
    ══════════════════════════════════════ */
    .ev-list { display: flex; flex-direction: column; gap: 6px; }
    .ev {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 9px 11px;
      background: rgba(96,165,250,.04);
      border-radius: 10px;
      border-left: 2px solid var(--work-accent);
    }
    .ev-date { min-width: 30px; text-align: center; }
    .ev-day  { font-size: 1rem; font-weight: 700; color: var(--work-accent); line-height: 1; }
    .ev-mon  { font-size: .58rem; text-transform: uppercase; color: var(--t3); letter-spacing: .04em; }
    .ev-title { font-size: .82rem; font-weight: 500; }
    .ev-time  { font-size: .68rem; color: var(--t2); font-family: var(--mono); }

    /* ══════════════════════════════════════
       EMAIL  (Gmail)
    ══════════════════════════════════════ */
    .email-list { display: flex; flex-direction: column; gap: 6px; }
    .email-item {
      padding: 9px 11px;
      background: rgba(96,165,250,.04);
      border-radius: 10px;
      cursor: default;
    }
    .email-item.unread { border-left: 2px solid var(--work-accent); }
    .email-item.read   { border-left: 2px solid transparent; opacity: .7; }
    .email-from   { font-size: .72rem; font-weight: 600; color: var(--t1); margin-bottom: 2px; }
    .email-subject{ font-size: .8rem; font-weight: 500; color: var(--t2); margin-bottom: 2px; }
    .email-time   { font-size: .65rem; color: var(--t3); font-family: var(--mono); }

    /* ══════════════════════════════════════
       PROXMOX NODE
    ══════════════════════════════════════ */
    .px-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
    .px-stat  {
      padding: 11px 12px;
      background: rgba(167,139,250,.04);
      border-radius: 10px;
    }
    .px-label { font-size: .62rem; text-transform: uppercase; letter-spacing: .1em; color: var(--t3); margin-bottom: 5px; }
    .px-val   { font-size: 1.4rem; font-weight: 600; font-family: var(--mono); margin-bottom: 6px; }
    .bar      { height: 3px; background: rgba(255,255,255,.07); border-radius: 2px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 2px; transition: width .6s ease; }
    .bar-fill.cpu  { background: linear-gradient(90deg,var(--work-accent),var(--lab-accent)); }
    .bar-fill.ram  { background: linear-gradient(90deg,var(--lab-accent),var(--amber)); }
    .bar-fill.disk { background: linear-gradient(90deg,var(--green),var(--work-accent)); }
    .px-sub   { font-size: .65rem; color: var(--t3); margin-top: 3px; }
    .uptime-tag {
      font-size: .63rem; font-family: var(--mono);
      color: var(--green); background: rgba(52,211,153,.1);
      padding: 2px 7px; border-radius: 20px;
    }

    /* ══════════════════════════════════════
       SERVICES
    ══════════════════════════════════════ */
    .svc-grid { display: flex; flex-direction: column; gap: 6px; }
    .svc {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 11px;
      background: rgba(167,139,250,.04);
      border-radius: 10px;
    }
    .svc-name  { font-size: .82rem; font-weight: 500; }
    .svc-right { display: flex; align-items: center; gap: 6px; font-size: .68rem; font-family: var(--mono); }
    .sdot { width: 7px; height: 7px; border-radius: 50%; }
    .sdot.up   { background: var(--green); box-shadow: 0 0 6px rgba(52,211,153,.5); }
    .sdot.down { background: var(--red);   box-shadow: 0 0 6px rgba(248,113,113,.5); }

    /* ══════════════════════════════════════
       VMs & CONTAINERS
    ══════════════════════════════════════ */
    .vm-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px,1fr));
      gap: 8px;
    }
    .vm {
      padding: 10px 12px;
      background: rgba(167,139,250,.04);
      border: 1px solid var(--border);
      border-radius: 11px;
    }
    .vm-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .vm-badge {
      font-size: .55rem; font-weight: 700; letter-spacing: .07em;
      text-transform: uppercase; padding: 2px 5px; border-radius: 4px;
    }
    .vm-badge.vm  { background: rgba(96,165,250,.14);  color: var(--work-accent); }
    .vm-badge.lxc { background: rgba(167,139,250,.14); color: var(--lab-accent); }
    .vm-id     { font-size: .62rem; color: var(--t3); font-family: var(--mono); }
    .vm-name   { font-size: .8rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; }
    .vm-status { display: flex; align-items: center; gap: 4px; font-size: .68rem; }
    .vdot { width: 5px; height: 5px; border-radius: 50%; }
    .vdot.running { background: var(--green); box-shadow: 0 0 5px rgba(52,211,153,.5); }
    .vdot.stopped { background: var(--t3); }
    .vdot.paused  { background: var(--amber); }
    .vm-bar { margin-top: 6px; height: 2px; background: rgba(255,255,255,.06); border-radius: 2px; overflow: hidden; }
    .vm-bar-fill { height: 100%; background: var(--lab-accent); border-radius: 2px; }

    /* ══════════════════════════════════════
       NEWS
    ══════════════════════════════════════ */
    .news-list { display: flex; flex-direction: column; gap: 6px; }
    a.news-item {
      display: block; padding: 9px 11px;
      background: rgba(167,139,250,.04);
      border-radius: 10px;
      text-decoration: none; color: inherit;
      transition: background .15s;
    }
    a.news-item:hover { background: rgba(167,139,250,.08); }
    .news-src   { font-size: .6rem; text-transform: uppercase; letter-spacing: .1em; color: var(--amber); margin-bottom: 3px; }
    .news-title { font-size: .78rem; font-weight: 500; line-height: 1.35; color: var(--t1); }

    /* ══════════════════════════════════════
       STATES
    ══════════════════════════════════════ */
    .loading { display: flex; align-items: center; gap: 5px; color: var(--t3); font-size: .78rem; }
    .ld { width:5px;height:5px;border-radius:50%;background:var(--t3);animation:ldot 1.2s ease-in-out infinite; }
    .ld:nth-child(2){animation-delay:.2s} .ld:nth-child(3){animation-delay:.4s}
    @keyframes ldot { 0%,60%,100%{transform:translateY(0);opacity:.3} 30%{transform:translateY(-5px);opacity:1} }
    .err   { font-size:.76rem;color:var(--red);background:rgba(248,113,113,.08);padding:7px 9px;border-radius:8px; }
    .empty { font-size:.76rem;color:var(--t3);text-align:center;padding:16px 0; }
    code   { font-family:var(--mono);font-size:.72rem;background:rgba(255,255,255,.07);padding:1px 5px;border-radius:4px; }

    /* ══════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════ */
    @media (max-width: 900px) {
      html, body { overflow: auto; }
      .body      { flex-direction: column; }
      .work-panel{ border-right: none; border-bottom: 1px solid var(--divider); }
      .panel-content { overflow-y: visible; }
    }
  </style>
</head>
<body>

<!-- ════ HEADER ════ -->
<header>
  <div class="logo">
    <div class="logo-orb"></div>
    <span>Vesper</span>
  </div>
  <div class="header-center">
    <div id="clock">--:--:--</div>
    <div id="dateline">…</div>
  </div>
  <div class="partition-labels">
    <span class="pl work">Work</span>
    <span class="pl lab">Homelab</span>
  </div>
</header>

<!-- ════ BODY: TWO PANELS ════ -->
<div class="body">

  <!-- ══ LEFT: WORK ══ -->
  <div class="panel work-panel">
    <div class="panel-header">
      <div class="ph-dot"></div>
      <span class="ph-label">Work</span>
    </div>
    <div class="panel-content">

      <!-- Weather (ambient, top of work day) -->
      <div id="weather-wrap">
        <div class="loading"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div>
      </div>

      <!-- Calendar -->
      <div class="card">
        <div class="card-head">
          <span class="card-label">Upcoming Events</span>
          <span class="cdot" style="background:var(--work-accent)"></span>
        </div>
        <div id="calendar-body">
          <div class="loading"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div>
        </div>
      </div>

      <!-- Email / Inbox -->
      <div class="card">
        <div class="card-head">
          <span class="card-label">Inbox</span>
          <span class="cdot" style="background:var(--work-accent)"></span>
        </div>
        <div id="email-body">
          <div class="loading"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div>
        </div>
      </div>

    </div>
  </div><!-- end work panel -->

  <!-- ══ RIGHT: HOMELAB ══ -->
  <div class="panel homelab-panel">
    <div class="panel-header">
      <div class="ph-dot"></div>
      <span class="ph-label">Homelab</span>
    </div>
    <div class="panel-content">

      <!-- Proxmox Node -->
      <div class="card">
        <div class="card-head">
          <span class="card-label">Proxmox Node</span>
          <span id="uptime-tag" class="uptime-tag" style="display:none"></span>
        </div>
        <div id="proxmox-body">
          <div class="loading"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div>
        </div>
      </div>

      <!-- Services -->
      <div class="card">
        <div class="card-head">
          <span class="card-label">Services</span>
          <span class="cdot" style="background:var(--green)"></span>
        </div>
        <div id="services-body">
          <div class="loading"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div>
        </div>
      </div>

      <!-- VMs & Containers -->
      <div class="card">
        <div class="card-head">
          <span class="card-label">VMs &amp; Containers</span>
          <span class="cdot" style="background:var(--lab-accent)"></span>
        </div>
        <div id="vms-body">
          <div class="loading"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div>
        </div>
      </div>

      <!-- News Feeds -->
      <div class="card">
        <div class="card-head">
          <span class="card-label">News &amp; Feeds</span>
          <span class="cdot" style="background:var(--amber)"></span>
        </div>
        <div id="feeds-body">
          <div class="loading"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div>
        </div>
      </div>

    </div>
  </div><!-- end homelab panel -->

</div><!-- end body -->

<script>
/* ── CLOCK ── */
function tick() {
  const n = new Date();
  document.getElementById('clock').textContent = n.toLocaleTimeString('en-GB',{hour12:false});
  document.getElementById('dateline').textContent = n.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}
setInterval(tick,1000); tick();

/* ── UTILS ── */
function fmtBytes(b){
  if(!b) return '0 B';
  const k=1024,s=['B','KB','MB','GB','TB'];
  const i=Math.floor(Math.log(b)/Math.log(k));
  return (b/Math.pow(k,i)).toFixed(1)+' '+s[i];
}
function fmtUptime(s){
  const d=Math.floor(s/86400),h=Math.floor((s%86400)/3600),m=Math.floor((s%3600)/60);
  return d>0?`${d}d ${h}h`:h>0?`${h}h ${m}m`:`${m}m`;
}
function pctColor(p){ return p<60?'var(--green)':p<80?'var(--amber)':'var(--red)'; }
async function api(path){ const r=await fetch('/api/'+path); if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); }

/* ── WEATHER ── */
async function loadWeather(){
  const el=document.getElementById('weather-wrap');
  try{
    const d=await api('weather');
    if(d.status==='unconfigured'){ el.innerHTML=`<div class="empty" style="text-align:left">Set <code>OPENWEATHER_API_KEY</code> in .env</div>`; return; }
    if(d.status==='error'){ el.innerHTML=`<div class="err">⚠ ${d.message}</div>`; return; }
    el.innerHTML=`<div class="weather-strip">
      <img class="ws-icon" src="${d.icon_url}" alt="${d.description}">
      <div class="ws-temp">${d.temp}<span class="ws-unit">${d.unit}</span></div>
      <div class="ws-right">
        <div class="ws-desc">${d.description} · ${d.city}</div>
        <div class="ws-meta">
          <div class="ws-mi">Feels <span>${d.feels_like}${d.unit}</span></div>
          <div class="ws-mi">Humidity <span>${d.humidity}%</span></div>
          <div class="ws-mi">Wind <span>${d.wind_speed} m/s</span></div>
        </div>
      </div>
    </div>`;
  }catch(e){ el.innerHTML=`<div class="err">⚠ Weather unavailable</div>`; }
}

/* ── CALENDAR ── */
async function loadCalendar(){
  const el=document.getElementById('calendar-body');
  try{
    const d=await api('calendar');
    if(d.status==='unconfigured'){ el.innerHTML=`<div class="empty">Set <code>ICAL_URL</code> in .env</div>`; return; }
    if(d.status==='error'){ el.innerHTML=`<div class="err">⚠ ${d.message}</div>`; return; }
    if(!d.events.length){ el.innerHTML=`<div class="empty">No events in the next 2 weeks</div>`; return; }
    el.innerHTML=`<div class="ev-list">${d.events.map(ev=>{
      const dt=new Date(ev.start);
      const time=ev.all_day?'All day':dt.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
      return `<div class="ev">
        <div class="ev-date">
          <div class="ev-day">${dt.getDate()}</div>
          <div class="ev-mon">${dt.toLocaleString('en',{month:'short'})}</div>
        </div>
        <div>
          <div class="ev-title">${ev.title}</div>
          <div class="ev-time">${time}${ev.location?' · '+ev.location:''}</div>
        </div>
      </div>`;
    }).join('')}</div>`;
  }catch(e){ el.innerHTML=`<div class="err">⚠ Calendar unavailable</div>`; }
}

/* ── EMAIL ── */
async function loadEmail(){
  const el=document.getElementById('email-body');
  try{
    const d=await api('email');
    if(d.status==='unconfigured'){ el.innerHTML=`<div class="empty">Set <code>GMAIL_TOKEN</code> in .env<br><span style="font-size:.68rem;color:var(--t3)">See .env.example for setup steps</span></div>`; return; }
    if(d.status==='error'){ el.innerHTML=`<div class="err">⚠ ${d.message}</div>`; return; }
    if(!d.messages.length){ el.innerHTML=`<div class="empty">Inbox is clear</div>`; return; }
    el.innerHTML=`<div class="email-list">${d.messages.map(m=>`
      <div class="email-item ${m.unread?'unread':'read'}">
        <div class="email-from">${m.from}</div>
        <div class="email-subject">${m.subject}</div>
        <div class="email-time">${m.date}</div>
      </div>`).join('')}</div>`;
  }catch(e){ el.innerHTML=`<div class="err">⚠ Email unavailable</div>`; }
}

/* ── PROXMOX NODE ── */
async function loadProxmox(){
  const el=document.getElementById('proxmox-body');
  const tag=document.getElementById('uptime-tag');
  try{
    const d=await api('proxmox/node');
    if(d.status==='error'){ el.innerHTML=`<div class="err">⚠ ${d.message}</div>`; tag.style.display='none'; return; }
    tag.textContent='↑ '+fmtUptime(d.uptime); tag.style.display='inline';
    el.innerHTML=`<div class="px-stats">
      <div class="px-stat">
        <div class="px-label">CPU</div>
        <div class="px-val" style="color:${pctColor(d.cpu)}">${d.cpu}<small style="font-size:.8rem">%</small></div>
        <div class="bar"><div class="bar-fill cpu" style="width:${d.cpu}%"></div></div>
      </div>
      <div class="px-stat">
        <div class="px-label">Memory</div>
        <div class="px-val" style="color:${pctColor(d.memory.percent)}">${d.memory.percent}<small style="font-size:.8rem">%</small></div>
        <div class="bar"><div class="bar-fill ram" style="width:${d.memory.percent}%"></div></div>
        <div class="px-sub">${fmtBytes(d.memory.used)} / ${fmtBytes(d.memory.total)}</div>
      </div>
      <div class="px-stat">
        <div class="px-label">Disk</div>
        <div class="px-val" style="color:${pctColor(d.disk.percent)}">${d.disk.percent}<small style="font-size:.8rem">%</small></div>
        <div class="bar"><div class="bar-fill disk" style="width:${d.disk.percent}%"></div></div>
        <div class="px-sub">${fmtBytes(d.disk.used)} / ${fmtBytes(d.disk.total)}</div>
      </div>
    </div>`;
  }catch(e){ el.innerHTML=`<div class="err">⚠ Proxmox unreachable</div>`; }
}

/* ── SERVICES ── */
async function loadServices(){
  const el=document.getElementById('services-body');
  try{
    const d=await api('health');
    if(d.status==='unconfigured'){ el.innerHTML=`<div class="empty">Set <code>SERVICES</code> in .env</div>`; return; }
    if(!d.services.length){ el.innerHTML=`<div class="empty">No services configured</div>`; return; }
    el.innerHTML=`<div class="svc-grid">${d.services.map(s=>`
      <div class="svc">
        <span class="svc-name">${s.name}</span>
        <div class="svc-right">
          <div class="sdot ${s.status}"></div>
          <span style="color:${s.status==='up'?'var(--green)':'var(--red)'}">
            ${s.status==='up'?s.response_ms+' ms':(s.reason||'down')}
          </span>
        </div>
      </div>`).join('')}</div>`;
  }catch(e){ el.innerHTML=`<div class="err">⚠ Services unavailable</div>`; }
}

/* ── VMs ── */
async function loadVMs(){
  const el=document.getElementById('vms-body');
  try{
    const d=await api('proxmox/vms');
    if(d.status==='error'){ el.innerHTML=`<div class="err">⚠ ${d.message}</div>`; return; }
    if(!d.vms.length){ el.innerHTML=`<div class="empty">No VMs or containers found</div>`; return; }
    el.innerHTML=`<div class="vm-grid">${d.vms.map(vm=>`
      <div class="vm">
        <div class="vm-head">
          <span class="vm-badge ${vm.type}">${vm.type.toUpperCase()}</span>
          <span class="vm-id">#${vm.id}</span>
        </div>
        <div class="vm-name">${vm.name}</div>
        <div class="vm-status">
          <div class="vdot ${vm.status}"></div>
          <span style="color:var(--t2)">${vm.status}</span>
          ${vm.status==='running'?`<span style="color:var(--t3);margin-left:auto;font-size:.62rem;font-family:var(--mono)">${vm.cpu}%</span>`:''}
        </div>
        ${vm.status==='running'?`<div class="vm-bar"><div class="vm-bar-fill" style="width:${Math.min(vm.cpu,100)}%"></div></div>`:''}
      </div>`).join('')}</div>`;
  }catch(e){ el.innerHTML=`<div class="err">⚠ VM data unavailable</div>`; }
}

/* ── NEWS ── */
async function loadFeeds(){
  const el=document.getElementById('feeds-body');
  try{
    const d=await api('feeds');
    if(d.status==='unconfigured'){ el.innerHTML=`<div class="empty">Set <code>RSS_FEEDS</code> in .env</div>`; return; }
    if(!d.articles.length){ el.innerHTML=`<div class="empty">No articles loaded</div>`; return; }
    el.innerHTML=`<div class="news-list">${d.articles.map(a=>`
      <a class="news-item" href="${a.link}" target="_blank" rel="noopener">
        <div class="news-src">${a.source}</div>
        <div class="news-title">${a.title}</div>
      </a>`).join('')}</div>`;
  }catch(e){ el.innerHTML=`<div class="err">⚠ Feeds unavailable</div>`; }
}

/* ── BOOT ── */
loadWeather(); loadCalendar(); loadEmail();
loadProxmox(); loadVMs(); loadServices(); loadFeeds();

setInterval(loadProxmox,  15_000);
setInterval(loadVMs,      30_000);
setInterval(loadServices, 30_000);
setInterval(loadEmail,   120_000);
setInterval(loadWeather, 600_000);
setInterval(loadCalendar,300_000);
setInterval(loadFeeds,  1800_000);
</script>
</body>
