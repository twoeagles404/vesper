<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vesper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #05070f;
      --surface:   rgba(255,255,255,0.04);
      --surface2:  rgba(255,255,255,0.07);
      --border:    rgba(255,255,255,0.08);
      --border-hi: rgba(255,255,255,0.15);
      --blue:   #60a5fa;
      --purple: #a78bfa;
      --amber:  #fbbf24;
      --green:  #34d399;
      --red:    #f87171;
      --t1: #f1f5f9;
      --t2: #94a3b8;
      --t3: #475569;
      --mono: 'JetBrains Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--t1); font-family: 'Inter', sans-serif; overflow: hidden; display: flex; flex-direction: column; }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }

    /* ─── HEADER ─────────────────────────────── */
    header {
      display: flex; align-items: center; gap: 20px;
      padding: 0 20px; height: 52px;
      border-bottom: 1px solid var(--border);
      background: rgba(5,7,15,.95); backdrop-filter: blur(20px);
      flex-shrink: 0; z-index: 99;
    }
    .logo { display: flex; align-items: center; gap: 8px; font-size: .8rem; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; }
    .orb {
      width: 20px; height: 20px; border-radius: 50; flex-shrink: 0;
      background: radial-gradient(circle at 40% 40%, #fbbf24 0%, #a78bfa 55%, transparent 100%);
      box-shadow: 0 0 14px rgba(167,139,250,.8), 0 0 28px rgba(251,191,36,.3);
      animation: orb 4s ease-in-out infinite; border-radius: 50%;
    }
    @keyframes orb { 0%,100%{box-shadow:0 0 14px rgba(167,139,250,.8),0 0 28px rgba(251,191,36,.3)} 50%{box-shadow:0 0 22px rgba(167,139,250,1),0 0 44px rgba(251,191,36,.5)} }

    /* TABS */
    .tabs { display: flex; gap: 2px; background: rgba(255,255,255,.04); border-radius: 8px; padding: 3px; }
    .tab {
      padding: 5px 18px; border-radius: 6px; border: none;
      font-family: 'Inter', sans-serif; font-size: .75rem; font-weight: 600;
      letter-spacing: .08em; text-transform: uppercase; cursor: pointer;
      color: var(--t3); background: transparent; transition: all .2s;
    }
    .tab:hover { color: var(--t2); }
    .tab.active-work   { background: rgba(96,165,250,.15);  color: var(--blue);   box-shadow: 0 0 12px rgba(96,165,250,.2); }
    .tab.active-lab    { background: rgba(167,139,250,.15); color: var(--purple); box-shadow: 0 0 12px rgba(167,139,250,.2); }

    .header-right { margin-left: auto; text-align: right; }
    #clock    { font-family: var(--mono); font-size: 1.4rem; font-weight: 500; line-height: 1; }
    #dateline { font-size: .62rem; color: var(--t2); letter-spacing: .06em; }

    /* ─── PAGES ──────────────────────────────── */
    .page { display: none; flex: 1; overflow: hidden; flex-direction: column; }
    .page.active { display: flex; }

    /* ════════════════════════════════════════════
       WORK PAGE
    ════════════════════════════════════════════ */
    #work-page {
      background-image: radial-gradient(ellipse at 20% 20%, rgba(96,165,250,.06) 0%, transparent 55%);
      overflow-y: auto; padding: 16px 20px; gap: 14px;
    }

    .work-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    /* weather full-width strip */
    .weather-bar {
      display: flex; align-items: center; gap: 16px;
      padding: 12px 18px;
      background: rgba(96,165,250,.06);
      border: 1px solid rgba(96,165,250,.12);
      border-radius: 12px;
      margin-bottom: 0;
    }
    .wb-icon  { width: 52px; height: 52px; }
    .wb-temp  { font-size: 2.4rem; font-weight: 300; line-height: 1; }
    .wb-unit  { font-size: 1rem; color: var(--t2); }
    .wb-info  { display: flex; flex-direction: column; gap: 3px; }
    .wb-desc  { font-size: .82rem; color: var(--t2); }
    .wb-meta  { display: flex; gap: 12px; }
    .wb-mi    { font-size: .68rem; color: var(--t3); }
    .wb-mi span { color: var(--t2); }

    /* cards */
    .wcard {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 14px 16px;
      transition: border-color .2s;
    }
    .wcard:hover { border-color: var(--border-hi); }
    .wcard-title {
      font-size: .62rem; font-weight: 700; letter-spacing: .14em;
      text-transform: uppercase; color: var(--t3); margin-bottom: 12px;
      display: flex; align-items: center; gap: 6px;
    }
    .wcard-title::before { content: ''; width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .calendar-card .wcard-title::before { background: var(--blue); }
    .email-card    .wcard-title::before { background: var(--amber); }

    /* calendar events */
    .ev-list { display: flex; flex-direction: column; gap: 7px; }
    .ev {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 9px 12px; background: rgba(96,165,250,.04);
      border-left: 2px solid var(--blue); border-radius: 0 9px 9px 0;
    }
    .ev-date { min-width: 32px; text-align: center; }
    .ev-d    { font-size: 1rem; font-weight: 700; color: var(--blue); line-height: 1; }
    .ev-m    { font-size: .58rem; text-transform: uppercase; color: var(--t3); }
    .ev-title{ font-size: .82rem; font-weight: 500; }
    .ev-time { font-size: .68rem; color: var(--t2); font-family: var(--mono); }

    /* email */
    .email-list { display: flex; flex-direction: column; gap: 7px; }
    .em {
      padding: 9px 12px;
      background: rgba(251,191,36,.03);
      border-radius: 9px; border: 1px solid transparent;
    }
    .em.unread { border-color: rgba(251,191,36,.15); }
    .em-from    { font-size: .72rem; font-weight: 600; color: var(--t1); }
    .em-subject { font-size: .78rem; color: var(--t2); margin-top: 2px; }
    .em-date    { font-size: .62rem; color: var(--t3); font-family: var(--mono); margin-top: 3px; }

    /* ════════════════════════════════════════════
       HOMELAB PAGE
    ════════════════════════════════════════════ */
    #lab-page {
      background-image: radial-gradient(ellipse at 80% 10%, rgba(167,139,250,.07) 0%, transparent 55%);
      overflow-y: auto; padding: 14px 18px;
      display: flex; flex-direction: column; gap: 14px;
    }

    /* ── STAT GAUGES ROW ── */
    .gauges-row {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    }
    .gauge-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 14px 16px;
      display: flex; align-items: center; gap: 14px;
      transition: border-color .2s;
    }
    .gauge-card:hover { border-color: var(--border-hi); }
    .gauge-svg { width: 68px; height: 68px; flex-shrink: 0; }
    .gauge-info { flex: 1; }
    .gauge-label { font-size: .62rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--t3); margin-bottom: 4px; }
    .gauge-val   { font-size: 1.6rem; font-weight: 600; font-family: var(--mono); line-height: 1; }
    .gauge-sub   { font-size: .65rem; color: var(--t3); margin-top: 4px; }

    /* ── SERVICES GRID ── */
    .section-title {
      font-size: .62rem; font-weight: 700; letter-spacing: .14em;
      text-transform: uppercase; color: var(--t3); margin-bottom: 8px;
    }
    .services-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(130px,1fr)); gap: 8px;
    }
    .svc-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 14px;
      display: flex; align-items: center; gap: 10px;
      transition: border-color .2s, background .2s;
    }
    .svc-card:hover { background: var(--surface2); border-color: var(--border-hi); }
    .svc-icon {
      width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: .85rem; font-weight: 700; color: #fff;
    }
    .svc-info { flex: 1; min-width: 0; }
    .svc-name { font-size: .78rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .svc-ms   { font-size: .65rem; font-family: var(--mono); margin-top: 2px; }
    .svc-dot  { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .svc-dot.up   { background: var(--green); box-shadow: 0 0 6px rgba(52,211,153,.5); }
    .svc-dot.down { background: var(--red);   box-shadow: 0 0 6px rgba(248,113,113,.5); }

    /* ── VMs TABLE ── */
    .vm-table-wrap {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden;
    }
    .vm-table { width: 100%; border-collapse: collapse; }
    .vm-table th {
      font-size: .6rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
      color: var(--t3); padding: 10px 14px; text-align: left;
      border-bottom: 1px solid var(--border); background: rgba(255,255,255,.02);
    }
    .vm-table td { padding: 9px 14px; font-size: .8rem; border-bottom: 1px solid rgba(255,255,255,.03); vertical-align: middle; }
    .vm-table tr:last-child td { border-bottom: none; }
    .vm-table tr:hover td { background: rgba(255,255,255,.025); }
    .type-badge {
      font-size: .55rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
      padding: 2px 6px; border-radius: 4px;
    }
    .type-badge.vm  { background: rgba(96,165,250,.15);  color: var(--blue); }
    .type-badge.lxc { background: rgba(167,139,250,.15); color: var(--purple); }
    .status-pill {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: .72rem; font-family: var(--mono);
    }
    .vdot { width: 6px; height: 6px; border-radius: 50%; }
    .vdot.running { background: var(--green); box-shadow: 0 0 5px rgba(52,211,153,.5); }
    .vdot.stopped { background: var(--t3); }
    .vdot.paused  { background: var(--amber); }
    .mini-bar { width: 60px; height: 4px; background: rgba(255,255,255,.07); border-radius: 2px; overflow: hidden; display: inline-block; vertical-align: middle; margin-left: 6px; }
    .mini-bar-fill { height: 100%; background: var(--purple); border-radius: 2px; }

    /* ── NEWS ── */
    .news-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap: 8px;
    }
    a.news-card {
      display: block; padding: 10px 13px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 11px; text-decoration: none; color: inherit;
      transition: background .15s, border-color .15s;
    }
    a.news-card:hover { background: var(--surface2); border-color: var(--border-hi); }
    .news-src   { font-size: .6rem; text-transform: uppercase; letter-spacing: .1em; color: var(--amber); margin-bottom: 4px; }
    .news-title { font-size: .79rem; font-weight: 500; line-height: 1.35; }

    /* ── SHARED STATES ── */
    .loading { display:flex;align-items:center;gap:5px;color:var(--t3);font-size:.77rem;padding:8px 0; }
    .ld{width:5px;height:5px;border-radius:50%;background:var(--t3);animation:ld 1.2s ease-in-out infinite;}
    .ld:nth-child(2){animation-delay:.2s}.ld:nth-child(3){animation-delay:.4s}
    @keyframes ld{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-5px);opacity:1}}
    .err   { font-size:.75rem;color:var(--red);background:rgba(248,113,113,.07);padding:8px 10px;border-radius:8px; }
    .empty { font-size:.75rem;color:var(--t3);padding:10px 0; }
    code   { font-family:var(--mono);font-size:.7rem;background:rgba(255,255,255,.08);padding:1px 5px;border-radius:4px; }

    /* responsive */
    @media(max-width:900px){
      html,body{overflow:auto}
      .work-grid{grid-template-columns:1fr}
      .gauges-row{grid-template-columns:1fr 1fr}
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo"><div class="orb"></div><span>Vesper</span></div>
  <div class="tabs">
    <button class="tab active-work" onclick="switchPage('work')">Work</button>
    <button class="tab" onclick="switchPage('lab')">Homelab</button>
  </div>
  <div class="header-right">
    <div id="clock">--:--:--</div>
    <div id="dateline">…</div>
  </div>
</header>

<!-- ═══ WORK PAGE ═══ -->
<div id="work-page" class="page active">

  <!-- Weather strip -->
  <div id="weather-bar-wrap" style="padding:16px 20px 0">
    <div class="loading"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div>
  </div>

  <div class="work-grid" style="padding:14px 20px 20px">

    <!-- Calendar -->
    <div class="wcard calendar-card">
      <div class="wcard-title">Upcoming Events</div>
      <div id="cal-body"><div class="loading"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div></div>
    </div>

    <!-- Email -->
    <div class="wcard email-card">
      <div class="wcard-title">Inbox</div>
      <div id="email-body"><div class="loading"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div></div>
    </div>

  </div>
</div>

<!-- ═══ HOMELAB PAGE ═══ -->
<div id="lab-page" class="page">

  <!-- Gauges -->
  <div class="gauges-row" id="gauges-row">
    <div class="gauge-card"><svg class="gauge-svg" id="g-cpu-svg"></svg><div class="gauge-info"><div class="gauge-label">CPU</div><div class="gauge-val" id="g-cpu-val">—</div><div class="gauge-sub" id="g-cpu-sub"></div></div></div>
    <div class="gauge-card"><svg class="gauge-svg" id="g-ram-svg"></svg><div class="gauge-info"><div class="gauge-label">Memory</div><div class="gauge-val" id="g-ram-val">—</div><div class="gauge-sub" id="g-ram-sub"></div></div></div>
    <div class="gauge-card"><svg class="gauge-svg" id="g-disk-svg"></svg><div class="gauge-info"><div class="gauge-label">Root Disk</div><div class="gauge-val" id="g-disk-val">—</div><div class="gauge-sub" id="g-disk-sub"></div></div></div>
    <div class="gauge-card"><svg class="gauge-svg" id="g-up-svg"></svg><div class="gauge-info"><div class="gauge-label">Uptime</div><div class="gauge-val" id="g-up-val">—</div><div class="gauge-sub" id="g-up-sub" style="color:var(--green)"></div></div></div>
  </div>

  <!-- Services -->
  <div>
    <div class="section-title">Services</div>
    <div id="svc-grid"><div class="loading"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div></div>
  </div>

  <!-- VMs & Containers -->
  <div>
    <div class="section-title">VMs &amp; Containers</div>
    <div id="vm-table-wrap"><div class="loading"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div></div>
  </div>

  <!-- News -->
  <div>
    <div class="section-title">News &amp; Feeds</div>
    <div id="news-grid"><div class="loading"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div></div>
  </div>

</div><!-- end lab-page -->

<script>
/* ── PAGE SWITCH ── */
let currentPage = 'work';
function switchPage(p) {
  currentPage = p;
  document.getElementById('work-page').classList.toggle('active', p==='work');
  document.getElementById('lab-page').classList.toggle('active',  p==='lab');
  const tabs = document.querySelectorAll('.tab');
  tabs[0].className = 'tab' + (p==='work' ? ' active-work' : '');
  tabs[1].className = 'tab' + (p==='lab'  ? ' active-lab'  : '');
}

/* ── CLOCK ── */
function tick() {
  const n = new Date();
  document.getElementById('clock').textContent = n.toLocaleTimeString('en-GB',{hour12:false});
  document.getElementById('dateline').textContent = n.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}
setInterval(tick,1000); tick();

/* ── API ── */
async function api(path) {
  const r = await fetch('/api/'+path);
  if (!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}

/* ── UTILS ── */
function fmtBytes(b){if(!b)return'0 B';const k=1024,s=['B','KB','MB','GB','TB'],i=Math.floor(Math.log(b)/Math.log(k));return(b/Math.pow(k,i)).toFixed(1)+' '+s[i];}
function fmtUptime(s){const d=Math.floor(s/86400),h=Math.floor((s%86400)/3600),m=Math.floor((s%3600)/60);return d>0?`${d}d ${h}h`:h>0?`${h}h ${m}m`:`${m}m`;}
function pctColor(p){return p<60?'var(--green)':p<80?'var(--amber)':'var(--red)';}

/* ── SVG GAUGE ── */
function drawGauge(svgId, pct, color) {
  const svg = document.getElementById(svgId);
  if (!svg) return;
  const r = 28, cx = 34, cy = 34, circ = 2 * Math.PI * r;
  const filled = circ * Math.min(pct, 100) / 100;
  svg.innerHTML = `
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="6"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="6"
      stroke-linecap="round"
      stroke-dasharray="${filled} ${circ - filled}"
      transform="rotate(-90 ${cx} ${cy})"
      style="transition:stroke-dasharray .6s ease"/>`;
}

/* keep uptime gauge always full green */
function drawUptimeGauge() {
  const svg = document.getElementById('g-up-svg');
  if (!svg) return;
  const r=28,cx=34,cy=34,circ=2*Math.PI*r;
  svg.innerHTML=`
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="6"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--green)" stroke-width="6"
      stroke-linecap="round" stroke-dasharray="${circ} 0" transform="rotate(-90 ${cx} ${cy})"/>`;
}

/* service icon color from name */
function svcColor(name) {
  const colors = ['#6366f1','#8b5cf6','#06b6d4','#10b981','#f59e0b','#ef4444','#3b82f6','#ec4899','#84cc16','#f97316'];
  let h = 0; for (let c of name) h = (h*31 + c.charCodeAt(0)) & 0xffff;
  return colors[h % colors.length];
}

/* ════════════
   WORK WIDGETS
   ════════════ */

async function loadWeather() {
  const el = document.getElementById('weather-bar-wrap');
  try {
    const d = await api('weather');
    if (d.status==='unconfigured') { el.innerHTML=`<div class="empty" style="padding:0">Set <code>OPENWEATHER_API_KEY</code> in .env</div>`; return; }
    if (d.status==='error') { el.innerHTML=`<div class="err">⚠ ${d.message}</div>`; return; }
    el.innerHTML=`<div class="weather-bar">
      <img class="wb-icon" src="${d.icon_url}" alt="">
      <div class="wb-temp">${d.temp}<span class="wb-unit">${d.unit}</span></div>
      <div class="wb-info">
        <div class="wb-desc">${d.description} · ${d.city}</div>
        <div class="wb-meta">
          <div class="wb-mi">Feels <span>${d.feels_like}${d.unit}</span></div>
          <div class="wb-mi">Humidity <span>${d.humidity}%</span></div>
          <div class="wb-mi">Wind <span>${d.wind_speed} m/s</span></div>
        </div>
      </div>
    </div>`;
  } catch(e) { el.innerHTML=`<div class="err">⚠ Weather unavailable</div>`; }
}

async function loadCalendar() {
  const el = document.getElementById('cal-body');
  try {
    const d = await api('calendar');
    if (d.status==='unconfigured') { el.innerHTML=`<div class="empty">Set <code>ICAL_URL</code> in .env</div>`; return; }
    if (d.status==='error') { el.innerHTML=`<div class="err">⚠ ${d.message}</div>`; return; }
    if (!d.events.length) { el.innerHTML=`<div class="empty">No events in the next 2 weeks</div>`; return; }
    el.innerHTML=`<div class="ev-list">${d.events.map(ev=>{
      const dt=new Date(ev.start);
      const time=ev.all_day?'All day':dt.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
      return `<div class="ev">
        <div class="ev-date"><div class="ev-d">${dt.getDate()}</div><div class="ev-m">${dt.toLocaleString('en',{month:'short'})}</div></div>
        <div><div class="ev-title">${ev.title}</div><div class="ev-time">${time}${ev.location?' · '+ev.location:''}</div></div>
      </div>`;
    }).join('')}</div>`;
  } catch(e) { el.innerHTML=`<div class="err">⚠ Calendar unavailable</div>`; }
}

async function loadEmail() {
  const el = document.getElementById('email-body');
  try {
    const d = await api('email');
    if (d.status==='unconfigured') { el.innerHTML=`<div class="empty">Set Gmail credentials in .env<br><span style="font-size:.65rem;color:var(--t3)">See .env.example for steps</span></div>`; return; }
    if (d.status==='error') { el.innerHTML=`<div class="err">⚠ ${d.message}</div>`; return; }
    if (!d.messages.length) { el.innerHTML=`<div class="empty">Inbox is empty</div>`; return; }
    el.innerHTML=`<div class="email-list">${d.messages.map(m=>`
      <div class="em ${m.unread?'unread':''}">
        <div class="em-from">${m.from}</div>
        <div class="em-subject">${m.subject}</div>
        <div class="em-date">${m.date}</div>
      </div>`).join('')}</div>`;
  } catch(e) { el.innerHTML=`<div class="err">⚠ Email unavailable</div>`; }
}

/* ═══════════════
   HOMELAB WIDGETS
   ═══════════════ */

async function loadProxmox() {
  try {
    const d = await api('proxmox/node');
    if (d.status==='error') {
      ['g-cpu-val','g-ram-val','g-disk-val','g-up-val'].forEach(id=>{ const e=document.getElementById(id); if(e)e.textContent='ERR'; });
      return;
    }
    // CPU gauge
    drawGauge('g-cpu-svg', d.cpu, pctColor(d.cpu));
    document.getElementById('g-cpu-val').textContent = d.cpu + '%';
    document.getElementById('g-cpu-val').style.color = pctColor(d.cpu);
    document.getElementById('g-cpu-sub').textContent = 'of all cores';

    // RAM gauge
    drawGauge('g-ram-svg', d.memory.percent, pctColor(d.memory.percent));
    document.getElementById('g-ram-val').textContent = d.memory.percent + '%';
    document.getElementById('g-ram-val').style.color = pctColor(d.memory.percent);
    document.getElementById('g-ram-sub').textContent = fmtBytes(d.memory.used)+' / '+fmtBytes(d.memory.total);

    // Disk gauge
    drawGauge('g-disk-svg', d.disk.percent, pctColor(d.disk.percent));
    document.getElementById('g-disk-val').textContent = d.disk.percent + '%';
    document.getElementById('g-disk-val').style.color = pctColor(d.disk.percent);
    document.getElementById('g-disk-sub').textContent = fmtBytes(d.disk.used)+' / '+fmtBytes(d.disk.total);

    // Uptime
    drawUptimeGauge();
    const ut = fmtUptime(d.uptime).split(' ');
    document.getElementById('g-up-val').textContent = ut[0];
    document.getElementById('g-up-sub').textContent = ut[1] || '';

  } catch(e) { console.warn('Proxmox node error:', e); }
}

async function loadVMs() {
  const el = document.getElementById('vm-table-wrap');
  try {
    const d = await api('proxmox/vms');
    if (d.status==='error') { el.innerHTML=`<div class="err" style="margin:0">⚠ ${d.message}</div>`; return; }
    if (!d.vms.length) { el.innerHTML=`<div class="empty">No VMs or containers found</div>`; return; }
    el.innerHTML=`<div class="vm-table-wrap">
      <table class="vm-table">
        <thead><tr>
          <th>Type</th><th>ID</th><th>Name</th><th>Status</th><th>CPU</th><th>Memory</th>
        </tr></thead>
        <tbody>${d.vms.map(vm=>{
          const memPct = vm.maxmem>0?Math.round(vm.mem/vm.maxmem*100):0;
          return `<tr>
            <td><span class="type-badge ${vm.type}">${vm.type.toUpperCase()}</span></td>
            <td style="font-family:var(--mono);color:var(--t3);font-size:.75rem">${vm.id}</td>
            <td style="font-weight:500">${vm.name}</td>
            <td><span class="status-pill"><span class="vdot ${vm.status}"></span><span style="color:var(--t2)">${vm.status}</span></span></td>
            <td style="font-family:var(--mono);font-size:.75rem">
              ${vm.status==='running'?`<span style="color:${pctColor(vm.cpu)}">${vm.cpu}%</span><span class="mini-bar"><span class="mini-bar-fill" style="width:${Math.min(vm.cpu,100)}%"></span></span>`:'—'}
            </td>
            <td style="font-family:var(--mono);font-size:.75rem">
              ${vm.status==='running'&&vm.maxmem>0?`<span style="color:${pctColor(memPct)}">${memPct}%</span> <span style="color:var(--t3)">${fmtBytes(vm.mem)}</span>`:'—'}
            </td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>`;
  } catch(e) { el.innerHTML=`<div class="err" style="margin:0">⚠ VM data unavailable</div>`; }
}

async function loadServices() {
  const el = document.getElementById('svc-grid');
  try {
    const d = await api('health');
    if (d.status==='unconfigured') { el.innerHTML=`<div class="empty">Set <code>SERVICES</code> in .env</div>`; return; }
    if (!d.services.length) { el.innerHTML=`<div class="empty">No services configured</div>`; return; }
    el.innerHTML=`<div class="services-grid">${d.services.map(s=>`
      <div class="svc-card">
        <div class="svc-icon" style="background:${svcColor(s.name)}">${s.name.charAt(0).toUpperCase()}</div>
        <div class="svc-info">
          <div class="svc-name">${s.name}</div>
          <div class="svc-ms" style="color:${s.status==='up'?'var(--green)':'var(--red)'}">
            ${s.status==='up'?s.response_ms+' ms':(s.reason||'offline')}
          </div>
        </div>
        <div class="svc-dot ${s.status}"></div>
      </div>`).join('')}</div>`;
  } catch(e) { el.innerHTML=`<div class="err">⚠ Services unavailable</div>`; }
}

async function loadFeeds() {
  const el = document.getElementById('news-grid');
  try {
    const d = await api('feeds');
    if (d.status==='unconfigured') { el.innerHTML=`<div class="empty">Set <code>RSS_FEEDS</code> in .env</div>`; return; }
    if (!d.articles.length) { el.innerHTML=`<div class="empty">No articles loaded</div>`; return; }
    el.innerHTML=`<div class="news-grid">${d.articles.map(a=>`
      <a class="news-card" href="${a.link}" target="_blank" rel="noopener">
        <div class="news-src">${a.source}</div>
        <div class="news-title">${a.title}</div>
      </a>`).join('')}</div>`;
  } catch(e) { el.innerHTML=`<div class="err">⚠ Feeds unavailable</div>`; }
}

/* ── BOOT ── */
// Work page
loadWeather(); loadCalendar(); loadEmail();
// Homelab page
loadProxmox(); loadVMs(); loadServices(); loadFeeds();

// Refresh intervals
setInterval(loadProxmox,   15_000);
setInterval(loadVMs,       30_000);
setInterval(loadServices,  30_000);
setInterval(loadEmail,    120_000);
setInterval(loadWeather,  600_000);
setInterval(loadCalendar, 300_000);
setInterval(loadFeeds,   1800_000);
</script>
</body>
