services:
  vesper:
    build: .
    container_name: vesper
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Config persists here — this is where all your settings are saved
      - ./data:/app/data
      # Mount frontend for live edits without rebuilding
      - ./frontend:/app/frontend:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
